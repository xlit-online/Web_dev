<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    header {
      padding: 15px;
      background: #1e293b;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .note-form {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .note-form h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      color: #38bdf8;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 15px;
      background: #334155;
      color: white;
    }

    textarea {
      height: 120px;
      resize: none;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }

    #saveBtn {
      background: #3b82f6;
      color: white;
      flex: 1;
    }

    #cancelBtn {
      background: #ef4444;
      color: white;
      display: none;
      flex: 1;
    }

    .search-box {
      margin-bottom: 15px;
    }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .note-card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0px 0px 8px rgba(0,0,0,0.3);
    }

    .note-card h3 {
      margin: 0 0 10px 0;
      color: #38bdf8;
      font-size: 18px;
    }

    .note-card p {
      font-size: 14px;
      color: #cbd5e1;
      white-space: pre-wrap;
    }

    .note-card small {
      display: block;
      margin-top: 10px;
      color: #94a3b8;
      font-size: 12px;
    }

    .note-actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
    }

    .btn-edit {
      background: #facc15;
      color: black;
      flex: 1;
    }

    .btn-delete {
      background: #ef4444;
      color: white;
      flex: 1;
    }
  </style>
</head>

<body>
  <header>📝 Notes App</header>

  <div class="container">

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search notes..." />
    </div>

    <div class="note-form">
      <h2 id="formTitle">Create Note</h2>

      <input type="text" id="titleInput" placeholder="Title" />
      <textarea id="contentInput" placeholder="Write your note..."></textarea>
      <input type="text" id="tagsInput" placeholder="Tags (comma separated)" />

      <div class="actions">
        <button id="saveBtn">Save Note</button>
        <button id="cancelBtn">Cancel</button>
      </div>
    </div>

    <div class="notes-grid" id="notesContainer"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
