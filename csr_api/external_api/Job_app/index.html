<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jobs App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f4f4f4;
    }

    h1 {
      text-align: center;
    }

    .search-box {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      font-size: 16px;
    }

    .job {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .job h3 {
      margin: 0;
    }

    .job a {
      display: inline-block;
      margin-top: 8px;
      color: blue;
      text-decoration: none;
    }

    .meta {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<h1>💼 Jobs Finder</h1>

<input 
  type="text" 
  id="search" 
  class="search-box" 
  placeholder="Search jobs (e.g. React, Python, Designer...)"
/>

<div id="jobs"></div>

<script src="script.js"></script>

</body>
</html>
